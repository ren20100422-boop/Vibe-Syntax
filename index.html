<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VisionBay Interactive Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div id="scale-wrapper">
        <div id="app">
            <!-- Background Elements -->
            <div class="bg-elements">
                <div class="glow-orb orb-1"></div>
                <div class="glow-orb orb-2"></div>
                <div class="glow-orb orb-3"></div>
                <div class="grid-overlay"></div>
            </div>

            <!-- Home Screen (Language Selection) -->
            <div id="home-screen" class="screen">
                <div class="home-center-box glass-panel">
                    <div class="logo-large">
                        <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="#00e5ff" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <polygon points="12 2 2 7 12 12 22 7 12 2"></polygon>
                            <polyline points="2 17 12 22 22 17"></polyline>
                            <polyline points="2 12 12 17 22 12"></polyline>
                        </svg>
                        VisionBay<span>.ai</span>
                    </div>
                    <div class="lang-select-container">
                        <button class="glass-btn lang-btn" onclick="startApp('en')">ENGLISH</button>
                        <button class="glass-btn lang-btn" onclick="startApp('tc')">中文</button>
                    </div>
                </div>
            </div>

            <!-- Main Dashboard Screen (Top-to-Bottom Layout for Portrait) -->
            <div id="dashboard-screen" class="screen" style="display: none; opacity: 0; flex-direction: column;">
                
                <!-- Top Header -->
                <header class="dash-header">
                    <div class="logo-large" onclick="goHome()" style="font-size: 50px; cursor: pointer;">
                        <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="#00e5ff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polygon points="12 2 2 7 12 12 22 7 12 2"></polygon>
                            <polyline points="2 17 12 22 22 17"></polyline>
                            <polyline points="2 12 12 17 22 12"></polyline>
                        </svg>
                        VisionBay<span>.ai</span>
                    </div>

                    <div class="header-actions">
                        <div class="qr-section">
                            <div class="qr-card">
                                <img src="assets/qr-contact.png" alt="Contact" class="qr-img">
                                <span>Contact</span>
                            </div>
                            <div class="qr-card">
                                <img src="assets/qr-linkedin.png" alt="LinkedIn" class="qr-img">
                                <span>LinkedIn</span>
                            </div>
                        </div>
                        
                        <div class="controls-stack">
                            <button class="glass-btn btn-sm" id="btn-lang-toggle" onclick="toggleLang()">EN / 中</button>
                            <button class="glass-btn btn-sm" onclick="goBack()" id="btn-back">
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                                <span id="text-back">Back</span>
                            </button>
                        </div>
                    </div>
                </header>

                <!-- 3-Tier Architecture Tabs -->
                <nav class="architecture-tabs">
                    <div class="stack-layer tier-app" id="nav-app_store" onclick="navigateToTier('app_store')">
                        <div class="stack-icon">3</div>
                        <span id="text-nav-app_store">AI App Store</span>
                    </div>
                    <div class="stack-layer tier-computing" id="nav-computing" onclick="navigateToTier('computing')">
                        <div class="stack-icon">2</div>
                        <span id="text-nav-computing">AI Computing Ops. Mgmt.</span>
                    </div>
                    <div class="stack-layer tier-data" id="nav-data_center" onclick="navigateToTier('data_center')">
                        <div class="stack-icon">1</div>
                        <span id="text-nav-data_center">AI Data Center</span>
                    </div>
                </nav>

                <!-- Full Width Content Area -->
                <main id="content-area">
                    <!-- Dynamic views injected here -->
                </main>
            </div>
        </div>
    </div>

    <script>
        function updateScale() {
            const app = document.getElementById('app');
            const scaleX = window.innerWidth / 1080;
            const scaleY = window.innerHeight / 1920;
            const scale = Math.min(scaleX, scaleY);
            app.style.transform = \`scale(\${scale})\`;
            app.style.left = \`\${(window.innerWidth - 1080 * scale) / 2}px\`;
            app.style.top = \`\${(window.innerHeight - 1920 * scale) / 2}px\`;
        }
        window.addEventListener('resize', updateScale);
        updateScale();
    </script>
    <script src="js/lib/d3.min.js"></script>
    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
